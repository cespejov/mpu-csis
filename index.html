<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Socio-Economic Registry</title>
    <link rel="stylesheet" href="./css/style.css" />

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-KZLCPZD4"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="container">
      <div class="card">
        <h2 id="form-title">Child Registration</h2>

        <nav class="form-tabs">
          <button class="tab-link active" data-target="personal-tab">
            Personal
          </button>
          <button class="tab-link" data-target="guardian-tab">Guardians</button>
          <button class="tab-link" data-target="education-tab">
            Education
          </button>
          <button class="tab-link" data-target="health-tab">Health</button>
          <button class="tab-link" data-target="household-tab">
            Household
          </button>
        </nav>

        <form id="registry-form">
          <input type="hidden" id="edit-idx" value="-1" />

          <div id="personal-tab" class="tab-content active">
            <div class="grid">
              <div class="form-group">
                <label>First Name</label><input type="text" id="c-fn" />
              </div>
              <div class="form-group">
                <label>Last Name</label><input type="text" id="c-ln" />
              </div>
              <div class="form-group">
                <label>DNI</label><input type="text" id="c-dni" />
              </div>
              <div class="form-group">
                <label>Sex</label>
                <select id="c-sex">
                  <option value="M">M</option>
                  <option value="F">F</option>
                </select>
              </div>
              <div class="form-group">
                <label>Birth Date</label><input type="date" id="c-dob" />
              </div>
              <div class="form-group">
                <label>Place of Birth</label><input type="text" id="c-pob" />
              </div>
              <div class="form-group">
                <label>Address</label><input type="text" id="c-addr" />
              </div>
              <div class="form-group">
                <label>City</label><input type="text" id="c-city" />
              </div>
              <div class="form-group">
                <label>Religion</label><input type="text" id="c-rel" />
              </div>
              <div class="form-group">
                <label>Phone</label><input type="text" id="c-phone" />
              </div>
              <div class="form-group">
                <label>Email</label><input type="email" id="c-email" />
              </div>
            </div>
          </div>

          <div id="guardian-tab" class="tab-content">
            <h3>Guardian Information</h3>
            <div id="guardian-container"></div>
            <button type="button" id="add-guardian-btn" class="btn btn-add">
              + Add Guardian
            </button>
          </div>

          <div id="education-tab" class="tab-content">
            <h3>Education Record</h3>
            <div class="grid">
              <div class="form-group">
                <label>School Name</label><input type="text" id="e-school" />
              </div>
              <div class="form-group">
                <label>Academic Year</label><input type="text" id="e-year" />
              </div>
              <div class="form-group">
                <label>Grade Level</label><input type="text" id="e-grade" />
              </div>
              <div class="form-group">
                <label>Enrollment Status</label>
                <select id="e-status">
                  <option>Enrolled</option>
                  <option>Dropped Out</option>
                  <option>Graduated</option>
                </select>
              </div>
              <div class="form-group">
                <label>Performance Level</label
                ><input type="text" id="e-performance" />
              </div>
              <div class="form-group">
                <label>Conduct</label><input type="text" id="e-conduct" />
              </div>
              <div class="form-group">
                <label>Attendance</label
                ><select id="e-attendance">
                  <option>Tardy</option>
                  <option>Absent</option>
                </select>
              </div>
              <div class="form-group">
                <label>Socialization</label
                ><input type="text" id="e-socialization" />
              </div>
              <div class="form-group">
                <label>Bullying Behavior</label
                ><input type="text" id="e-bullying" />
              </div>
              <div class="form-group">
                <label>Social Behavior</label
                ><input type="text" id="e-social-behavior" />
              </div>
              <div class="form-group">
                <label>Observation</label
                ><input type="text" id="e-observation" />
              </div>
            </div>
          </div>

          <div id="health-tab" class="tab-content">
            <h3>Health Record</h3>
            <div class="grid">
              <div class="form-group">
                <label>Blood Type</label><input type="text" id="h-blood" />
              </div>
              <div class="form-group">
                <label>Vaccination Status</label
                ><input type="text" id="h-vax" />
              </div>
              <div class="form-group">
                <label>Allergies</label><textarea id="h-allergies"></textarea>
              </div>
            </div>
          </div>

          <div id="household-tab" class="tab-content">
            <h3>Household Environment</h3>
            <div class="grid">
              <div class="form-group">
                <label>Number of Inhabitants</label
                ><input type="number" id="h-count" />
              </div>
              <div class="form-group">
                <label>Monthly Income</label
                ><input type="number" id="h-income" />
              </div>
              <div class="form-group">
                <label>Housing Type</label><input type="text" id="h-type" />
              </div>
            </div>
          </div>

          <div class="form-footer">
            <button type="button" id="clear-btn" class="btn btn-secondary">
              Clear
            </button>
            <button type="button" class="btn btn-save">Save Full Record</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h3>Registry List</h3>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>DNI</th>
                <th>Child Name</th>
                <th>Guardian</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="registry-table"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="viewModal" class="modal">
      <div class="modal-content">
        <div style="display: flex; justify-content: space-between">
          <h2 id="v-title" style="border: none">Child Profile</h2>
          <button
            class="modal-close"
            style="border: none; font-size: 1.5rem; cursor: pointer"
          >
            &times;
          </button>
        </div>
        <div class="view-grid" id="v-child-data"></div>
        <h3 style="margin-top: 30px">Guardian Details</h3>
        <div id="v-guardians-data"></div>
      </div>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
